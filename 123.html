        const Settings = createIcon(<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>);
        const Home = createIcon(<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>);
        const Box = createIcon(<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>);
        const Truck = createIcon(<><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></>);
        const AlertCircle = createIcon(<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>);
        const FileText = createIcon(<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>);
        const BarChart2 = createIcon(<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>);
        const Users = createIcon(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>);
        const Smartphone = createIcon(<><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>);
        const Printer = createIcon(<><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></>);
        const User = createIcon(<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>);
        const Menu = createIcon(<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>);
        const X = createIcon(<><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></>);
        
        // 日期控件专属方向箭头
        const ChevronLeft = createIcon(<polyline points="15 18 9 12 15 6"/>);
        const ChevronRight = createIcon(<polyline points="9 18 15 12 9 6"/>);
        const ChevronsLeft = createIcon(<><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></>);
        const ChevronsRight = createIcon(<><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></>);


        // --- 2. 自定义高级日期选择器 (参考提供的高级样式) ---
        const CustomDateRangePicker = ({ value, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [viewDate, setViewDate] = useState(new Date());
            const [startDate, setStartDate] = useState(null);
            const [endDate, setEndDate] = useState(null);
            const [hoverDate, setHoverDate] = useState(null);
            const popoverRef = useRef(null);

            // 点击外部关闭弹窗
            useEffect(() => {
                const handleOutsideClick = (e) => {
                    if (popoverRef.current && !popoverRef.current.contains(e.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleOutsideClick);
                return () => document.removeEventListener('mousedown', handleOutsideClick);
            }, []);

            // 格式化日期辅助函数
            const formatDateStr = (date) => {
                if (!date) return '';
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            // 快捷键逻辑
            const applyShortcut = (type) => {
                const today = new Date();
                let start = new Date();
                let end = new Date();

                switch (type) {
                    case 'today': break;
                    case 'yesterday': 
                        start.setDate(today.getDate() - 1);
                        end.setDate(today.getDate() - 1);
                        break;
                    case 'last3': start.setDate(today.getDate() - 2); break;
                    case 'last7': start.setDate(today.getDate() - 6); break;
                    case 'last15': start.setDate(today.getDate() - 14); break;
                    case 'last30': start.setDate(today.getDate() - 29); break;
                    case 'last90': start.setDate(today.getDate() - 89); break;
                }
                const s = formatDateStr(start);
                const e = formatDateStr(end);
                setStartDate(s);
                setEndDate(e);
                onChange(s === e ? s : `${s} 至 ${e}`);
                setViewDate(end);
                setIsOpen(false);
            };

            // 日期点击逻辑 (支持选单个日期，也支持选范围)
            const handleDayClick = (dateStr) => {
                if (!startDate || (startDate && endDate)) {
                    // 开始全新选择
                    setStartDate(dateStr);
                    setEndDate(null);
                } else {
                    // 补全结束日期
                    let s = startDate;
                    let e = dateStr;
                    if (dateStr < startDate) {
                        s = dateStr;
                        e = startDate;
                    }
                    setStartDate(s);
                    setEndDate(e);
                    onChange(s === e ? s : `${s} 至 ${e}`);
                    setIsOpen(false);
                }
            };

            // 构建日历数据
            const viewYear = viewDate.getFullYear();
            const viewMonth = viewDate.getMonth();
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const firstDayIndex = new Date(viewYear, viewMonth, 1).getDay();
            const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

            const calendarCells = [];
            // 填充上月尾部
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                calendarCells.push({ dateStr: formatDateStr(new Date(viewYear, viewMonth - 1, prevMonthDays - i)), day: prevMonthDays - i, isCurrentMonth: false });
            }
            // 填充当月
            for (let i = 1; i <= daysInMonth; i++) {
                calendarCells.push({ dateStr: formatDateStr(new Date(viewYear, viewMonth, i)), day: i, isCurrentMonth: true });
            }
            // 填充下月头部，凑齐 42 格 (6行x7天)
            const remaining = 42 - calendarCells.length;
            for (let i = 1; i <= remaining; i++) {
                calendarCells.push({ dateStr: formatDateStr(new Date(viewYear, viewMonth + 1, i)), day: i, isCurrentMonth: false });
            }

            const todayStr = formatDateStr(new Date());

            // 样式辅助判定
            const isSelected = (dateStr) => dateStr === startDate || dateStr === endDate;
            const isInRange = (dateStr) => {
                if (startDate && endDate) return dateStr > startDate && dateStr < endDate;
                if (startDate && hoverDate && !endDate) {
                    const min = startDate < hoverDate ? startDate : hoverDate;
                    const max = startDate > hoverDate ? startDate : hoverDate;
                    return dateStr > min && dateStr < max;
                }
                return false;
            };

            return (
                <div className="relative w-full text-left font-sans" ref={popoverRef}>
                    {/* 模拟的 Input 触发器 */}
                    <div 
                        className={`w-full border rounded px-2 py-1.5 text-sm cursor-pointer flex items-center justify-between transition-colors ${isOpen ? 'border-blue-500' : 'border-gray-300'} bg-white hover:border-blue-400`}
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className={`truncate ${value ? "text-gray-700" : "text-gray-400"}`}>
                            {value || '选择到达时间'}
                        </span>
                        <Calendar size={14} className="text-gray-400 shrink-0 ml-1" />
                    </div>
                    
                    {/* 弹出的选择器面板 */}
                    {isOpen && (
                        <div className="absolute top-full right-0 mt-2 bg-white shadow-[0_4px_16px_rgba(0,0,0,0.12)] border border-gray-100 flex z-[100] rounded-sm select-none" style={{ width: '380px' }}>
                            {/* 左侧快捷选项 */}
                            <div className="w-[100px] border-r border-gray-100 py-2 flex flex-col text-[13px]">
                                {[
                                    { label: '今天', type: 'today' },
                                    { label: '昨天', type: 'yesterday' },
                                    { label: '最近3天', type: 'last3' },
                                    { label: '最近7天', type: 'last7' },
                                    { label: '最近15天', type: 'last15' },
                                    { label: '最近30天', type: 'last30' },
                                    { label: '最近90天', type: 'last90' },
                                ].map(item => (
                                    <div 
                                        key={item.type}
                                        className="px-4 py-2 hover:bg-[#f2f6fc] hover:text-[#409EFF] cursor-pointer text-gray-600 transition-colors"
                                        onClick={() => applyShortcut(item.type)}
                                    >
                                        {item.label}
                                    </div>
                                ))}
                            </div>

                            {/* 右侧日历面板 */}
                            <div className="flex-1 p-3">
                                {/* 顶部控制头 */}
                                <div className="flex justify-between items-center mb-3 text-gray-400 px-1">
                                    <div className="flex space-x-2 cursor-pointer">
                                        <span onClick={() => setViewDate(new Date(viewYear - 1, viewMonth, 1))} className="hover:text-[#409EFF]"><ChevronsLeft size={16}/></span>
                                        <span onClick={() => setViewDate(new Date(viewYear, viewMonth - 1, 1))} className="hover:text-[#409EFF]"><ChevronLeft size={16}/></span>
                                    </div>
                                    <div className="text-[14px] text-gray-700 font-medium tracking-wide">{viewYear} 年 {viewMonth + 1} 月</div>
                                    <div className="flex space-x-2 cursor-pointer">
                                        <span onClick={() => setViewDate(new Date(viewYear, viewMonth + 1, 1))} className="hover:text-[#409EFF]"><ChevronRight size={16}/></span>
                                        <span onClick={() => setViewDate(new Date(viewYear + 1, viewMonth, 1))} className="hover:text-[#409EFF]"><ChevronsRight size={16}/></span>
                                    </div>
                                </div>

                                {/* 星期行 */}
                                <div className="grid grid-cols-7 text-center mb-2 border-b border-gray-100 pb-2">
                                    {['日','一','二','三','四','五','六'].map(d => (
                                        <div key={d} className="text-gray-500 text-[12px]">{d}</div>
                                    ))}
                                </div>

                                {/* 日期网格 */}
                                <div className="grid grid-cols-7 text-center text-[13px] gap-y-[4px]">
                                    {calendarCells.map((cell, idx) => {
                                        const selected = isSelected(cell.dateStr);
                                        const inRange = isInRange(cell.dateStr);
                                        const isToday = cell.dateStr === todayStr;

                                        let baseClasses = "h-[30px] flex items-center justify-center cursor-pointer relative ";
                                        let textClasses = "z-10 w-[24px] h-[24px] flex items-center justify-center rounded-sm transition-colors ";
                                        
                                        // 处理文字样式
                                        if (!cell.isCurrentMonth) textClasses += "text-gray-300 ";
                                        else if (selected) textClasses += "bg-[#409EFF] text-white ";
                                        else if (isToday) textClasses += "text-[#409EFF] font-bold ";
                                        else textClasses += "text-gray-600 hover:text-[#409EFF] ";

                                        // 处理多选连线背景样式 (浅蓝色 #f2f6fc)
                                        let bgClasses = "absolute inset-0 ";
                                        if (inRange) {
                                            bgClasses += "bg-[#f2f6fc] ";
                                        } else if (selected && startDate && (endDate || hoverDate)) {
                                            const currentEnd = endDate || hoverDate;
                                            if (cell.dateStr === startDate && currentEnd > startDate) bgClasses += "bg-[#f2f6fc] left-1/2 w-1/2 ";
                                            else if (cell.dateStr === startDate && currentEnd < startDate) bgClasses += "bg-[#f2f6fc] right-1/2 w-1/2 ";
                                            else if (cell.dateStr === currentEnd && currentEnd > startDate) bgClasses += "bg-[#f2f6fc] right-1/2 w-1/2 ";
                                            else if (cell.dateStr === currentEnd && currentEnd < startDate) bgClasses += "bg-[#f2f6fc] left-1/2 w-1/2 ";
                                            else bgClasses += "hidden ";
                                        } else {
                                            bgClasses += "hidden ";
                                        }

                                        return (
                                            <div 
                                                key={idx} 
                                                className={baseClasses}
                                                onClick={() => handleDayClick(cell.dateStr)}
                                                onMouseEnter={() => setHoverDate(cell.dateStr)}
                                                onMouseLeave={() => setHoverDate(null)}
                                            >
                                                <div className={bgClasses}></div>
                                                <div className={textClasses}>{cell.day}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- 3. 主应用组件代码 ---
        const App = () => {
          // 模拟列表数据
          const tableData = [
            { id: 1, orderNo: 'HY26030300002', skuCount: 1, status: '已完成', planArrive: '2026-03-20', carrier: '这是一个承运商', isLinked: '否', importEntity: '无', createTime: '2026-03-03 15:07:10', finishTime: '2026-03-03 15:08:20' },
            { id: 2, orderNo: 'HY26030300001', skuCount: 1, status: '部分发货-已完成', planArrive: '2026-03-20', carrier: '这是一个承运商', isLinked: '否', importEntity: '无', createTime: '2026-03-03 15:01:39', finishTime: '2026-03-03 15:05:52' },
            { id: 3, orderNo: 'HY26012000005', skuCount: 1, status: '已完成', planArrive: '2026-01-31', carrier: '5', isLinked: '否', importEntity: '无', createTime: '2026-01-20 17:21:50', finishTime: '2026-01-20 17:23:23' },
            { id: 4, orderNo: 'HY26012000004', skuCount: 1, status: '已完成', planArrive: '2026-01-31', carrier: '1', isLinked: '否', importEntity: '无', createTime: '2026-01-20 11:02:28', finishTime: '2026-01-20 11:15:18' },
            { id: 5, orderNo: 'HY26012000003', skuCount: 0, status: '部分发货', planArrive: '2027-01-27', carrier: 's', isLinked: '否', importEntity: '无', createTime: '2026-01-20 11:00:32', finishTime: '--' },
            { id: 6, orderNo: 'HY26012000002', skuCount: 1, status: '已完成', planArrive: '2027-01-27', carrier: 'wu', isLinked: '否', importEntity: '无', createTime: '2026-01-20 10:42:41', finishTime: '2026-01-20 10:59:50' },
            { id: 7, orderNo: 'HY26012000001', skuCount: 1, status: '已完成', planArrive: '2027-01-01', carrier: '无', isLinked: '否', importEntity: '无', createTime: '2026-01-20 10:30:07', finishTime: '2026-01-20 10:31:25' },
            { id: 8, orderNo: 'HY26011200011', skuCount: 1, status: '已完成', planArrive: '2026-01-18', carrier: 'Fanka-Online', isLinked: '是', importEntity: 'Online', createTime: '2026-01-12 16:14:50', finishTime: '2026-01-12 16:15:25' },
            { id: 9, orderNo: 'HY26011200010', skuCount: 1, status: '已完成', planArrive: '2026-01-19', carrier: 'Fanka-Online', isLinked: '是', importEntity: 'Online', createTime: '2026-01-12 16:10:55', finishTime: '2026-01-12 16:12:07' },
            { id: 10, orderNo: 'HY26011200009', skuCount: 1, status: '已完成', planArrive: '2026-01-19', carrier: 'VIVAIA-株式会社', isLinked: '是', importEntity: '株式会社STARLINK', createTime: '2026-01-12 16:02:43', finishTime: '2026-01-12 16:03:13' },
          ];

          const [activeDropdownId, setActiveDropdownId] = useState(null);

          // 弹窗相关的状态
          const [isModalVisible, setIsModalVisible] = useState(false);
          const [selectedOrder, setSelectedOrder] = useState(null);
          const [dispatchNotes, setDispatchNotes] = useState([]);

          const toggleDropdown = (id) => {
            setActiveDropdownId(activeDropdownId === id ? null : id);
          };

          // 打开弹窗并生成该调拨单对应的模拟发货单数据
          const openMarkTimeModal = (order) => {
            setSelectedOrder(order);
            // 模拟生成2条发货单数据
            setDispatchNotes([
              { id: `DN-${order.orderNo}-01`, logisticsProvider: '', arrivalTime: '' },

            ]);
            setIsModalVisible(true);
            setActiveDropdownId(null); // 关闭下拉菜单
          };

          // 处理表格输入框变化
          const handleNoteChange = (id, field, value) => {
            setDispatchNotes(prev => prev.map(note => 
              note.id === id ? { ...note, [field]: value } : note
            ));
          };

          // 保存操作
          const handleSaveTime = () => {
            setIsModalVisible(false);
          };

          return (
            <div className="flex h-screen bg-[#f3f4f6] font-sans text-sm text-gray-700">
              {/* 侧边栏 */}
              <aside className="w-56 bg-[#00A870] text-white flex flex-col shrink-0 overflow-y-auto">
                <div className="p-4 text-xl font-bold flex items-center border-b border-[#009660]">
                  {/* Logo 占位 */}
                  <div className="w-6 h-6 bg-white/20 rounded mr-2"></div>
                  库存管理
                </div>
                <nav className="flex-1 py-4">
                  <NavItem icon={<Box size={16}/>} label="收货管理" />
                  <NavItem icon={<Smartphone size={16}/>} label="PDA" />
                  <NavItem icon={<Truck size={16}/>} label="发货管理" />
                  <NavItem icon={<AlertCircle size={16}/>} label="异常还库管理" />
                  <NavItem icon={<FileText size={16}/>} label="快递换单" />

                  <NavItem icon={<BarChart2 size={16}/>} label="统计" />
                  <NavItem icon={<Box size={16}/>} label="渠道库存管理" />
                  <NavItem icon={<Users size={16}/>} label="库存主体管理" />
                  
                  <div className="bg-[#009660]/50">
                    <NavItem icon={<Truck size={16}/>} label="海外仓调拨" active={true} hasChildren={true} />
                    <div className="pl-10 py-2 bg-[#1A4B6B]">
                      <div className="flex items-center text-white text-xs cursor-pointer">
                        <div className="w-1.5 h-1.5 rounded-full border border-white mr-2"></div>
                        调拨单
                      </div>
                    </div>
                    <div className="pl-10 py-2 hover:bg-white/10">
                      <div className="flex items-center text-white/70 text-xs cursor-pointer">
                        <div className="w-1.5 h-1.5 rounded-full border border-white/70 mr-2"></div>
                        装箱出库
                      </div>
                    </div>
                  </div>
                  
                  <NavItem icon={<Truck size={16}/>} label="KA线下发货" />
                  <NavItem icon={<Truck size={16}/>} label="经销商发货管理" />
                  <NavItem icon={<Printer size={16}/>} label="RFID标签打印" />
                </nav>
              </aside>

              {/* 右侧主体内容 */}
              <main className="flex-1 flex flex-col min-w-0 overflow-hidden">

                      </div>
                      <div className="flex items-center col-span-2">
                        <label className="w-20 text-right mr-2 text-gray-600">调拨单号：</label>

                      <div className="flex items-center">

                      </div>

                      <div className="flex items-center">

                          <select className="w-full border border-gray-300 rounded px-2 py-1.5 appearance-none focus:outline-none focus:border-blue-500">
                            <option>全部</option>
                          </select>
                          <ChevronDown size={14} className="absolute right-2 top-2.5 text-gray-400 pointer-events-none"/>
                        </div>
                      </div>
                      <div className="flex items-center">
                        <label className="w-20 text-right mr-2 text-gray-600">发货状态：</label>
                        <div className="flex-1 relative">
                          <select className="w-full border border-gray-300 rounded px-2 py-1.5 appearance-none focus:outline-none focus:border-blue-500">
                            <option>全部</option>
                          </select>
                          <ChevronDown size={14} className="absolute right-2 top-2.5 text-gray-400 pointer-events-none"/>

                      </div>
                      <div className="flex items-center">
                        <label className="w-20 text-right mr-2 text-gray-600">承运商：</label>
                        <input type="text" placeholder="供应商名称" className="flex-1 border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500"/>
                      </div>
                      <div className="flex items-center">
                        <label className="w-20 text-right mr-2 text-gray-600">计划到达：</label>
                        <div className="flex-1 flex items-center border border-gray-300 rounded px-2 py-1.5 bg-white">
                          <Calendar size={14} className="text-gray-400 mr-2"/>

                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-4 gap-4">
                      <div className="flex items-center">
                        <label className="w-20 text-right mr-2 text-gray-600">创建时间：</label>
                        <div className="flex-1 flex items-center border border-gray-300 rounded px-2 py-1.5 bg-white">
                          <Calendar size={14} className="text-gray-400 mr-2"/>
                          <input type="text" placeholder="开始日期" className="w-20 outline-none text-xs"/>
                          <span className="mx-1 text-gray-300">-</span>

                          <th className="py-3 px-4 font-medium border-b border-gray-200">是否关联主体</th>

                            <td className="py-3 px-4 border-b border-gray-100">{index + 1}</td>
                            <td className="py-3 px-4 border-b border-gray-100">{row.orderNo}</td>
                            <td className="py-3 px-4 border-b border-gray-100">{row.skuCount}</td>
                            <td className="py-3 px-4 border-b border-gray-100">{row.status}</td>
                            <td className="py-3 px-4 border-b border-gray-100">{row.planArrive}</td>

                            <td className="py-3 px-4 border-b border-gray-100">{row.finishTime}</td>

                                <div className="relative">
                                  <button 
                                    className="hover:underline flex items-center"
                                    onClick={() => toggleDropdown(row.id)}
                                    onBlur={() => setTimeout(() => setActiveDropdownId(null), 200)} 
                                  >
                                    更多 <ChevronDown size={12} className="ml-1" />

                                  {activeDropdownId === row.id && (
                                    <div className="absolute right-0 top-full mt-1 w-28 bg-white border border-blue-100 shadow-md rounded-sm z-50 text-xs py-1 text-left"

                                        onMouseDown={(e) => { 
                                          e.preventDefault(); 
                                          openMarkTimeModal(row);
                                        }}
                                      >
                                        标记到货时间
                                      </div>
                                    </div>

                                </div>

                      <button className="px-2.5 py-1 border border-[#00A870] text-white bg-[#00A870] rounded">1</button>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">2</button>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">3</button>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">4</button>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">5</button>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">6</button>
                      <span className="px-1">...</span>
                      <button className="px-2.5 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">20</button>
                      <button className="px-2 py-1 border border-gray-200 rounded bg-white hover:bg-gray-50">›</button>
                    </div>
                    <span className="ml-4 mr-2">共 194 条</span>

                      <h3 className="text-[15px] font-medium text-gray-800">标记到货时间 - {selectedOrder?.orderNo}</h3>
                      <button onClick={() => setIsModalVisible(false)} className="text-gray-400 hover:text-gray-500">
                        <X size={20} />
                      </button>
                    </div>

                            <th className="py-2.5 px-3 font-medium border-b border-r border-gray-200 w-[25%]">发货单号</th>

                          </tr>
                        </thead>
                        <tbody className="text-[#606266]">
                          {dispatchNotes.map((note) => (
                            <tr key={note.id} className="hover:bg-blue-50/30">

                                <input 
                                  type="text" 
                                  placeholder="请输入物流商"
                                  value={note.logisticsProvider}
                                  onChange={(e) => handleNoteChange(note.id, 'logisticsProvider', e.target.value)}
                                  className="w-full border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500 text-sm"
                                />
                              </td>
                              <td className="py-3 px-3 border-b border-gray-200">
                                {/* 替换为我们新封装的日期选择器组件 */}

                                  value={note.arrivalTime} 
                                  onChange={(val) => handleNoteChange(note.id, 'arrivalTime', val)}
                                />
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    
                    {/* 弹窗底部操作 */}
                    <div className="px-5 py-3 border-t border-gray-200 flex justify-end space-x-3 bg-gray-50 mt-auto">
                      <button 
                        onClick={() => setIsModalVisible(false)}
                        className="px-4 py-1.5 border border-gray-300 rounded text-gray-600 hover:bg-gray-100 transition-colors"
                      >
                        取消

                      <button 
                        onClick={handleSaveTime}
                        className="px-4 py-1.5 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors shadow-sm"

          <div className={`flex items-center justify-between px-4 py-3 cursor-pointer transition-colors ${active ? 'bg-[#009660]/50' : 'hover:bg-white/10'}`}>
            <div className="flex items-center text-sm">
              <span className="mr-3 opacity-90">{icon}</span>
              <span className={active ? 'font-medium' : ''}>{label}</span>
            </div>
            {hasChildren && (
              <ChevronDown size={14} className={`transform ${active ? 'rotate-180' : ''} opacity-70`} />
            )}
          </div>
        );

        // 4. 将 React 渲染到页面的 root 节点
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
